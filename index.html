<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>低碳中国行 - 美团单车地图探索版</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <!-- 顶部控制面板 -->
    <header class="control-panel top-panel">
      <div class="header-left">
        <span class="user-name">Rider_Cyber_99</span>
        <span class="project-title">低碳中国行</span>
      </div>
      <div class="header-right">
        <span class="stat" id="unlockedCount">已解锁城市: 1/18</span>
        <span class="stat energy-total">⚡ 总电量: <span id="totalEnergy">750</span> W</span>
      </div>
      <div class="energy-bar-wrap">
        <label class="energy-label">当前电量</label>
        <div class="energy-bar">
          <div class="energy-fill" id="energyFill"></div>
        </div>
        <span class="energy-value" id="energyValue">100/100</span>
      </div>
    </header>

    <!-- 地图画布 -->
    <main class="map-container">
      <svg class="map-canvas" id="mapSvg" viewBox="0 0 1000 850" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="chinaFill" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#e8eef2" />
            <stop offset="100%" style="stop-color:#d4dce2" />
          </linearGradient>
          <filter id="nodeGlow">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
          <filter id="nodeGlowStrong">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        <!-- 中国轮廓 -->
        <path id="chinaOutline" class="china-outline" fill="url(#chinaFill)" stroke="#c5cdd4" stroke-width="1" />
        <!-- 城市间虚线 -->
        <g id="routesLayer"></g>
        <!-- 城市节点 -->
        <g id="nodesLayer"></g>
        <!-- 骑车小人：美团单车风格精细化 -->
        <g id="avatarLayer">
          <g class="avatar" id="avatar">
            <!-- 头盔 -->
            <path class="avatar-helmet" d="M -4 -18 Q 0 -21 4 -18 L 4 -14 Q 0 -12 -4 -14 Z" />
            <!-- 头部 -->
            <ellipse class="avatar-head" cx="0" cy="-13" rx="4" ry="5" />
            <!-- 躯干（骑行服） -->
            <path class="avatar-torso" d="M -3 -8 L 3 -6 L 5 4 L 2 10 L -2 10 L -5 4 Z" />
            <!-- 手臂/握把 -->
            <path class="avatar-arm" d="M 3 -6 L 10 2 M -3 -8 L -10 0" stroke-width="2" />
            <!-- 车架：下管、座管、上管 -->
            <path class="avatar-frame" d="M -9 17 L 9 17 M -9 17 L 0 4 L 9 17 M 0 4 L 0 -1" />
            <circle class="avatar-seat" cx="0" cy="2" r="2" />
            <!-- 前轮 -->
            <circle class="avatar-wheel-outer" cx="9" cy="18" r="6" />
            <circle class="avatar-wheel-inner" cx="9" cy="18" r="3.5" />
            <line class="avatar-spoke" x1="9" y1="18" x2="9" y2="11.5" />
            <line class="avatar-spoke" x1="9" y1="18" x2="15.5" y2="18" />
            <line class="avatar-spoke" x1="9" y1="18" x2="9" y2="24.5" />
            <line class="avatar-spoke" x1="9" y1="18" x2="2.5" y2="18" />
            <!-- 后轮 -->
            <circle class="avatar-wheel-outer" cx="-9" cy="18" r="6" />
            <circle class="avatar-wheel-inner" cx="-9" cy="18" r="3.5" />
            <line class="avatar-spoke" x1="-9" y1="18" x2="-9" y2="11.5" />
            <line class="avatar-spoke" x1="-9" y1="18" x2="-2.5" y2="18" />
            <line class="avatar-spoke" x1="-9" y1="18" x2="-9" y2="24.5" />
            <line class="avatar-spoke" x1="-9" y1="18" x2="-15.5" y2="18" />
            <!-- 曲柄与脚踏 -->
            <g class="avatar-crank">
              <line x1="5" y1="4" x2="9" y2="16" stroke="#2d2d2d" stroke-width="1.5" />
              <circle cx="9" cy="16" r="2" fill="#ffd100" stroke="#e6bc00" stroke-width="0.5" />
            </g>
            <g class="avatar-crank avatar-crank-b">
              <line x1="-5" y1="4" x2="-9" y2="16" stroke="#2d2d2d" stroke-width="1.5" />
              <circle cx="-9" cy="16" r="2" fill="#ffd100" stroke="#e6bc00" stroke-width="0.5" />
            </g>
          </g>
        </g>
      </svg>
    </main>

    <!-- 中部：当前城市地标 -->
    <section class="control-panel mid-panel">
      <div class="landmark-card">
        <div class="landmark-silhouette" id="landmarkIcon"></div>
        <h2 class="landmark-name" id="landmarkName">天坛</h2>
        <p class="landmark-desc" id="landmarkDesc">北京地标 · 祈年殿</p>
      </div>
    </section>

    <!-- 底部控制 -->
    <footer class="control-panel bottom-panel">
      <div class="bottom-left">
        <button type="button" class="btn-depart" id="btnDepart">
          <span class="btn-icon">▷</span> 立即出发 <span class="btn-cost" id="departCost">(-10电量)</span>
        </button>
      </div>
      <div class="bottom-right">
        <div class="reward-status" id="rewardStatus">
          <span class="reward-check" id="rewardCheck">✓ 已获得<span id="rewardCityName">北京</span>专属券</span>
        </div>
        <button type="button" class="btn-charge" id="btnCharge" title="每次+20电量">
          <span class="btn-charge-icon">⚡</span> 充电 <span class="btn-charge-value">(+20)</span>
        </button>
      </div>
    </footer>
  </div>

  <!-- 到达城市弹窗（毛玻璃卡片） -->
  <div class="modal-overlay hidden" id="welcomeModal">
    <div class="modal-card glass">
      <h3 class="modal-title">欢迎来到<span id="modalCityName">北京</span>！</h3>
      <p class="modal-desc">您已通过低碳骑行跨越了 <strong id="modalDistance">0</strong> 公里。</p>
      <button type="button" class="btn-reward" id="btnClaimReward">领取纪念品</button>
      <button type="button" class="btn-close-modal" id="btnCloseModal">稍后再说</button>
    </div>
  </div>

  <!-- 纪念品/优惠券弹窗 -->
  <div class="modal-overlay hidden" id="couponModal">
    <div class="modal-card glass coupon-card">
      <div class="coupon-icon" id="couponIcon"></div>
      <h3 class="modal-title"><span id="couponCityName">北京</span>专属券</h3>
      <p class="coupon-desc" id="couponDesc">天坛文创满50减10</p>
      <button type="button" class="btn-close-modal" id="btnCloseCoupon">收下了</button>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
